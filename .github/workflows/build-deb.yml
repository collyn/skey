name: Build .deb Package

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'
  workflow_dispatch:

permissions:
  contents: write  # needed for GitHub Release + pushing to gh-pages

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake extra-cmake-modules libfcitx5core-dev fcitx5 pkg-config gettext dpkg-dev apt-utils librsvg2-bin

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build .deb package
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Upload .deb as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: '*.deb'

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: '*.deb'

      - name: Publish to APT repository
        if: github.ref_type == 'tag'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APT_GPG_KEY_EMAIL: ${{ secrets.APT_GPG_KEY_EMAIL }}
        run: |
          # Import GPG private key from secret
          echo "${{ secrets.APT_GPG_PRIVATE_KEY }}" | gpg --import --batch
          # Publish to gh-pages APT repo
          scripts/apt-repo/update-repo.sh ./*.deb
